name: NostrVpnIos
options:
  bundleIdPrefix: ${NVPN_IOS_BUNDLE_ID}
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

configs:
  Debug: debug
  DeviceDebug: debug
  Release: release

settings:
  base:
    MARKETING_VERSION: ${NVPN_APP_VERSION_NAME}
    # Apple uses (CFBundleShortVersionString, CFBundleVersion) as the unique
    # build key on App Store Connect. Hardcoding CURRENT_PROJECT_VERSION = 1
    # makes every TestFlight upload at the same marketing version conflict
    # silently. NVPN_APP_VERSION_CODE is derived from the workspace version
    # (4.0.20 -> 4000020) so each release lands a unique CFBundleVersion.
    # All entry points (scripts/ios-build for release, tools/run-ios for
    # debug/sim) source release_common.sh + run resolve_shared_build_metadata
    # before xcodegen so both env vars resolve at project-generation time.
    # xcodegen only supports plain ${VAR} substitution — bash-style
    # ${VAR:-default} leaks through verbatim into pbxproj and breaks builds.
    CURRENT_PROJECT_VERSION: ${NVPN_APP_VERSION_CODE}
    VERSIONING_SYSTEM: apple-generic
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: 5.0
    IPHONEOS_DEPLOYMENT_TARGET: 17.0
    ENABLE_DEBUG_DYLIB: NO
    NVPN_IOS_BUNDLE_ID: ${NVPN_IOS_BUNDLE_ID}
    NVPN_IOS_PACKET_TUNNEL_BUNDLE_ID: ${NVPN_IOS_PACKET_TUNNEL_BUNDLE_ID}
    NVPN_IOS_APP_GROUP_IDENTIFIER: ${NVPN_IOS_APP_GROUP_IDENTIFIER}

targets:
  NostrVpnIos:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Resources
        buildPhase: resources
    settings:
      base:
        PRODUCT_NAME: Nostr VPN
        PRODUCT_MODULE_NAME: NostrVpnIos
        PRODUCT_BUNDLE_IDENTIFIER: ${NVPN_IOS_BUNDLE_ID}
        INFOPLIST_FILE: Info.plist
        CODE_SIGN_ENTITLEMENTS: NostrVpnIos.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        HEADER_SEARCH_PATHS: $(PROJECT_DIR)/Bindings
        SWIFT_OBJC_BRIDGING_HEADER: Bindings/NostrVpnAppCoreC.h
      configs:
        DeviceDebug:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: $(NVPN_IOS_CODE_SIGN_IDENTITY)
          PROVISIONING_PROFILE: $(NVPN_IOS_PROVISIONING_PROFILE_UUID)
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: $(NVPN_IOS_CODE_SIGN_IDENTITY)
          PROVISIONING_PROFILE: $(NVPN_IOS_PROVISIONING_PROFILE_UUID)
    dependencies:
      - framework: Frameworks/NostrVpnAppCore.xcframework
        embed: false
      - target: PacketTunnel
        embed: true
        codeSign: true
        copy:
          destination: plugins
      - sdk: NetworkExtension.framework
      - sdk: AppIntents.framework
      - sdk: SystemConfiguration.framework

  PacketTunnel:
    type: app-extension
    platform: iOS
    sources:
      - path: PacketTunnel
      - path: Resources/PrivacyInfo.xcprivacy
        buildPhase: resources
    settings:
      base:
        PRODUCT_NAME: Nostr VPN Tunnel
        PRODUCT_MODULE_NAME: PacketTunnel
        PRODUCT_BUNDLE_IDENTIFIER: ${NVPN_IOS_PACKET_TUNNEL_BUNDLE_ID}
        INFOPLIST_FILE: PacketTunnel/Info.plist
        CODE_SIGN_ENTITLEMENTS: PacketTunnel/PacketTunnel.entitlements
        HEADER_SEARCH_PATHS: $(PROJECT_DIR)/Bindings
        SWIFT_OBJC_BRIDGING_HEADER: Bindings/NostrVpnAppCoreC.h
      configs:
        DeviceDebug:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: $(NVPN_IOS_CODE_SIGN_IDENTITY)
          PROVISIONING_PROFILE: $(NVPN_IOS_PACKET_TUNNEL_PROVISIONING_PROFILE_UUID)
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: $(NVPN_IOS_CODE_SIGN_IDENTITY)
          PROVISIONING_PROFILE: $(NVPN_IOS_PACKET_TUNNEL_PROVISIONING_PROFILE_UUID)
    dependencies:
      - framework: Frameworks/NostrVpnAppCore.xcframework
        embed: false
      - sdk: NetworkExtension.framework
      - sdk: SystemConfiguration.framework

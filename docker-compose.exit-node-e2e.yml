services:
  internet-target:
    build:
      context: .
      dockerfile: ${NVPN_EXIT_NODE_E2E_DOCKERFILE:-Dockerfile.e2e}
      args:
        NVPN_E2E_BUILDER_IMAGE: ${NVPN_E2E_BUILDER_IMAGE:-rust:1.93-bookworm}
        NVPN_E2E_RUNTIME_IMAGE: ${NVPN_E2E_RUNTIME_IMAGE:-debian:bookworm-slim}
        NVPN_E2E_BUILDER_APT_INSTALL: ${NVPN_E2E_BUILDER_APT_INSTALL:-1}
        NVPN_E2E_RUNTIME_APT_INSTALL: ${NVPN_E2E_RUNTIME_APT_INSTALL:-1}
        NVPN_PATCH_LOCAL_FIPS: ${NVPN_PATCH_LOCAL_FIPS:-0}
      additional_contexts:
        cashu-spilman-channels: ${NVPN_CASHU_SPILMAN_CHANNELS_REPO_PATH:-./docker/empty-cashu-spilman-context}
        fips: ${NVPN_FIPS_REPO_PATH:-./docker/empty-fips-context}
    entrypoint: ["sleep", "infinity"]
    cap_add:
      - NET_ADMIN
      - NET_RAW
    networks:
      internet:
        ipv4_address: ${NVPN_E2E_INTERNET_TARGET_IP:-198.18.242.100}

  cashu-mint:
    profiles: ["paid-exit"]
    build:
      context: .
      dockerfile: ${NVPN_EXIT_NODE_E2E_DOCKERFILE:-Dockerfile.paid-exit-e2e}
      args:
        NVPN_PATCH_LOCAL_FIPS: ${NVPN_PATCH_LOCAL_FIPS:-0}
      additional_contexts:
        cashu-spilman-channels: ${NVPN_CASHU_SPILMAN_CHANNELS_REPO_PATH:-./docker/empty-cashu-spilman-context}
        fips: ${NVPN_FIPS_REPO_PATH:-./docker/empty-fips-context}
    command:
      - cdk-spilman-test-mintd
      - --listen-host
      - 0.0.0.0
      - --listen-port
      - "3338"
      - --base-url
      - http://${NVPN_E2E_CASHU_MINT_IP:-198.18.242.50}:3338
    networks:
      internet:
        ipv4_address: ${NVPN_E2E_CASHU_MINT_IP:-198.18.242.50}

  wireguard-upstream:
    build:
      context: .
      dockerfile: ${NVPN_EXIT_NODE_E2E_DOCKERFILE:-Dockerfile.e2e}
      args:
        NVPN_E2E_BUILDER_IMAGE: ${NVPN_E2E_BUILDER_IMAGE:-rust:1.93-bookworm}
        NVPN_E2E_RUNTIME_IMAGE: ${NVPN_E2E_RUNTIME_IMAGE:-debian:bookworm-slim}
        NVPN_E2E_BUILDER_APT_INSTALL: ${NVPN_E2E_BUILDER_APT_INSTALL:-1}
        NVPN_E2E_RUNTIME_APT_INSTALL: ${NVPN_E2E_RUNTIME_APT_INSTALL:-1}
        NVPN_PATCH_LOCAL_FIPS: ${NVPN_PATCH_LOCAL_FIPS:-0}
      additional_contexts:
        cashu-spilman-channels: ${NVPN_CASHU_SPILMAN_CHANNELS_REPO_PATH:-./docker/empty-cashu-spilman-context}
        fips: ${NVPN_FIPS_REPO_PATH:-./docker/empty-fips-context}
    entrypoint: ["sleep", "infinity"]
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.forwarding=1
      - net.ipv4.conf.default.forwarding=1
    devices:
      - /dev/net/tun:/dev/net/tun
    networks:
      internet:
        ipv4_address: ${NVPN_E2E_WG_UPSTREAM_IP:-198.18.242.20}

  node-a:
    build:
      context: .
      dockerfile: ${NVPN_EXIT_NODE_E2E_DOCKERFILE:-Dockerfile.e2e}
      args:
        NVPN_E2E_BUILDER_IMAGE: ${NVPN_E2E_BUILDER_IMAGE:-rust:1.93-bookworm}
        NVPN_E2E_RUNTIME_IMAGE: ${NVPN_E2E_RUNTIME_IMAGE:-debian:bookworm-slim}
        NVPN_E2E_BUILDER_APT_INSTALL: ${NVPN_E2E_BUILDER_APT_INSTALL:-1}
        NVPN_E2E_RUNTIME_APT_INSTALL: ${NVPN_E2E_RUNTIME_APT_INSTALL:-1}
        NVPN_PATCH_LOCAL_FIPS: ${NVPN_PATCH_LOCAL_FIPS:-0}
      additional_contexts:
        cashu-spilman-channels: ${NVPN_CASHU_SPILMAN_CHANNELS_REPO_PATH:-./docker/empty-cashu-spilman-context}
        fips: ${NVPN_FIPS_REPO_PATH:-./docker/empty-fips-context}
    entrypoint: ["sleep", "infinity"]
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    networks:
      internet:
        ipv4_address: ${NVPN_E2E_NODE_A_PUBLIC_IP:-198.18.242.10}

  nat-b:
    build:
      context: .
      dockerfile: ${NVPN_EXIT_NODE_E2E_DOCKERFILE:-Dockerfile.e2e}
      args:
        NVPN_E2E_BUILDER_IMAGE: ${NVPN_E2E_BUILDER_IMAGE:-rust:1.93-bookworm}
        NVPN_E2E_RUNTIME_IMAGE: ${NVPN_E2E_RUNTIME_IMAGE:-debian:bookworm-slim}
        NVPN_E2E_BUILDER_APT_INSTALL: ${NVPN_E2E_BUILDER_APT_INSTALL:-1}
        NVPN_E2E_RUNTIME_APT_INSTALL: ${NVPN_E2E_RUNTIME_APT_INSTALL:-1}
        NVPN_PATCH_LOCAL_FIPS: ${NVPN_PATCH_LOCAL_FIPS:-0}
      additional_contexts:
        cashu-spilman-channels: ${NVPN_CASHU_SPILMAN_CHANNELS_REPO_PATH:-./docker/empty-cashu-spilman-context}
        fips: ${NVPN_FIPS_REPO_PATH:-./docker/empty-fips-context}
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.forwarding=1
      - net.ipv4.conf.default.forwarding=1
    command:
      - sh
      - -lc
      - |
        set -e
        public_iface="$$(ip -o -4 addr show | awk '$$4 == "${NVPN_E2E_NAT_B_PUBLIC_IP:-198.18.242.11}/24" { print $$2; exit }')"
        private_iface="$$(ip -o -4 addr show | awk '$$4 == "172.30.242.2/24" { print $$2; exit }')"
        test -n "$$public_iface"
        test -n "$$private_iface"
        iptables -P FORWARD ACCEPT
        iptables -t nat -A PREROUTING -i "$$public_iface" -p udp --dport 51820 -j DNAT --to-destination 172.30.242.3:51820
        iptables -t nat -A POSTROUTING -o "$$public_iface" -s 172.30.242.0/24 -p udp --sport 51820 -j SNAT --to-source ${NVPN_E2E_NAT_B_PUBLIC_IP:-198.18.242.11}:51820
        iptables -t nat -A POSTROUTING -o "$$public_iface" -s 172.30.242.0/24 -j MASQUERADE
        sleep infinity
    networks:
      private-b:
        ipv4_address: 172.30.242.2
      internet:
        ipv4_address: ${NVPN_E2E_NAT_B_PUBLIC_IP:-198.18.242.11}

  node-b:
    build:
      context: .
      dockerfile: ${NVPN_EXIT_NODE_E2E_DOCKERFILE:-Dockerfile.e2e}
      args:
        NVPN_E2E_BUILDER_IMAGE: ${NVPN_E2E_BUILDER_IMAGE:-rust:1.93-bookworm}
        NVPN_E2E_RUNTIME_IMAGE: ${NVPN_E2E_RUNTIME_IMAGE:-debian:bookworm-slim}
        NVPN_E2E_BUILDER_APT_INSTALL: ${NVPN_E2E_BUILDER_APT_INSTALL:-1}
        NVPN_E2E_RUNTIME_APT_INSTALL: ${NVPN_E2E_RUNTIME_APT_INSTALL:-1}
        NVPN_PATCH_LOCAL_FIPS: ${NVPN_PATCH_LOCAL_FIPS:-0}
      additional_contexts:
        cashu-spilman-channels: ${NVPN_CASHU_SPILMAN_CHANNELS_REPO_PATH:-./docker/empty-cashu-spilman-context}
        fips: ${NVPN_FIPS_REPO_PATH:-./docker/empty-fips-context}
    entrypoint: ["sleep", "infinity"]
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    depends_on:
      - nat-b
    networks:
      private-b:
        ipv4_address: 172.30.242.3

networks:
  internet:
    driver: bridge
    ipam:
      config:
        - subnet: ${NVPN_E2E_INTERNET_SUBNET:-198.18.242.0/24}
  private-b:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.242.0/24

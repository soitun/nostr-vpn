services:
  internet-target:
    build:
      context: .
      dockerfile: Dockerfile.e2e
      additional_contexts:
        fips: ${NVPN_FIPS_REPO_PATH:-../fips}
    entrypoint: ["sleep", "infinity"]
    networks:
      internet:
        ipv4_address: ${NVPN_E2E_INTERNET_TARGET_IP:-198.51.100.100}

  wireguard-upstream:
    build:
      context: .
      dockerfile: Dockerfile.e2e
      additional_contexts:
        fips: ${NVPN_FIPS_REPO_PATH:-../fips}
    entrypoint: ["sleep", "infinity"]
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.forwarding=1
      - net.ipv4.conf.default.forwarding=1
    devices:
      - /dev/net/tun:/dev/net/tun
    networks:
      internet:
        ipv4_address: ${NVPN_E2E_WG_UPSTREAM_IP:-198.51.100.20}

  node-a:
    build:
      context: .
      dockerfile: Dockerfile.e2e
      additional_contexts:
        fips: ${NVPN_FIPS_REPO_PATH:-../fips}
    entrypoint: ["sleep", "infinity"]
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    networks:
      internet:
        ipv4_address: ${NVPN_E2E_NODE_A_PUBLIC_IP:-198.51.100.10}

  nat-b:
    build:
      context: .
      dockerfile: Dockerfile.e2e
      additional_contexts:
        fips: ${NVPN_FIPS_REPO_PATH:-../fips}
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.forwarding=1
      - net.ipv4.conf.default.forwarding=1
    command:
      - sh
      - -lc
      - |
        set -e
        public_iface="$$(ip -o -4 addr show | awk '$$4 == "${NVPN_E2E_NAT_B_PUBLIC_IP:-198.51.100.11}/24" { print $$2; exit }')"
        private_iface="$$(ip -o -4 addr show | awk '$$4 == "172.30.242.2/24" { print $$2; exit }')"
        test -n "$$public_iface"
        test -n "$$private_iface"
        iptables -P FORWARD ACCEPT
        iptables -t nat -A PREROUTING -i "$$public_iface" -p udp --dport 51820 -j DNAT --to-destination 172.30.242.3:51820
        iptables -t nat -A POSTROUTING -o "$$public_iface" -s 172.30.242.0/24 -p udp --sport 51820 -j SNAT --to-source ${NVPN_E2E_NAT_B_PUBLIC_IP:-198.51.100.11}:51820
        iptables -t nat -A POSTROUTING -o "$$public_iface" -s 172.30.242.0/24 -j MASQUERADE
        sleep infinity
    networks:
      private-b:
        ipv4_address: 172.30.242.2
      internet:
        ipv4_address: ${NVPN_E2E_NAT_B_PUBLIC_IP:-198.51.100.11}

  node-b:
    build:
      context: .
      dockerfile: Dockerfile.e2e
      additional_contexts:
        fips: ${NVPN_FIPS_REPO_PATH:-../fips}
    entrypoint: ["sleep", "infinity"]
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    depends_on:
      - nat-b
    networks:
      private-b:
        ipv4_address: 172.30.242.3

networks:
  internet:
    driver: bridge
    ipam:
      config:
        - subnet: ${NVPN_E2E_INTERNET_SUBNET:-198.51.100.0/24}
  private-b:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.242.0/24

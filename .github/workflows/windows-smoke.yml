name: Windows Smoke

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to test (branch, tag, or SHA). Defaults to the current ref when left blank.
        required: false
        default: ''

env:
  CARGO_TERM_COLOR: always

jobs:
  windows-smoke:
    name: Windows app smoke
    runs-on: windows-latest
    permissions:
      contents: read
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false

      - name: Run Rust tests
        run: cargo test --workspace

      - name: Build CLI release binary
        run: cargo build --release -p nvpn

      - name: Install Windows native package dependencies
        run: choco install llvm innosetup -y --no-progress

      - name: Build Windows installer
        env:
          NVPN_WINDOWS_LLVM_BIN: C:\Program Files\LLVM\bin
        run: .\scripts\windows-build.ps1 -Configuration Release -Installer -Tag v0.0.0 -OutputDir dist

      - name: Smoke launch installed Windows app
        run: .\scripts\windows-installer-smoke.ps1 -InstallerPath dist\nostr-vpn-v0.0.0-windows-x64-setup.exe -ArtifactRoot artifacts

      - name: Package smoke artifacts
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null

          $files = @(
            "target/release/nvpn.exe",
            "dist/nostr-vpn-v0.0.0-windows-x64-setup.exe",
            "artifacts/windows-app-launch-smoke.json"
          )

          foreach ($file in $files) {
            if (-not (Test-Path $file)) {
              throw "Expected build output not found: $file"
            }
            $source = Resolve-Path $file
            $dist = Resolve-Path dist
            if ((Split-Path -Parent $source) -ne $dist) {
              Copy-Item $source dist/
            }
          }

          Compress-Archive -Path dist/* -DestinationPath artifacts/windows-smoke.zip -Force

      - name: Upload smoke artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-smoke
          path: artifacts/windows-smoke.zip
          retention-days: 7

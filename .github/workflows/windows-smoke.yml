name: Windows Smoke

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to test (branch, tag, or SHA). Defaults to the current ref when left blank.
        required: false
        default: ''

env:
  CARGO_TERM_COLOR: always

jobs:
  windows-smoke:
    name: Windows CLI smoke
    runs-on: windows-latest
    permissions:
      contents: read
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false

      - name: Run Rust tests
        run: cargo test --workspace

      - name: Build CLI release binary
        run: cargo build --release -p nostr-vpn-cli

      - name: Package smoke artifacts
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null

          $files = @(
            "target/release/nvpn.exe"
          )

          foreach ($file in $files) {
            if (-not (Test-Path $file)) {
              throw "Expected build output not found: $file"
            }
            Copy-Item $file dist/
          }

          Compress-Archive -Path dist/* -DestinationPath artifacts/windows-smoke.zip -Force

      - name: Upload smoke artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-smoke
          path: artifacts/windows-smoke.zip
          retention-days: 7

name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always

jobs:
  checks:
    name: Lint + Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Reclaim runner disk for the release gate
        run: |
          sudo rm -rf -- /usr/local/lib/android /usr/share/dotnet /opt/ghc /usr/local/.ghcup /opt/hostedtoolcache/CodeQL
          docker system prune --all --force

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux native dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libdbus-1-dev pkg-config

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false

      - name: Run release gate
        env:
          NVPN_RELEASE_GATE_WINDOWS_GUI_SMOKE: '0'
          NVPN_RELEASE_GATE_WINDOWS_WG_EXIT_E2E: '0'
        run: ./scripts/release-gate.sh

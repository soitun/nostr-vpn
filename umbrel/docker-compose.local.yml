version: "3.7"

services:
  daemon:
    image: ${NOSTR_VPN_IMAGE:-nostr-vpn-umbrel:local}
    build:
      context: ..
      dockerfile: umbrel/Dockerfile
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    entrypoint:
      - /usr/local/bin/nvpn
    command:
      - daemon
      - --paused
      - --config
      - /data/config/nvpn/config.toml
    environment:
      HOME: /data/home
      XDG_CONFIG_HOME: /data/config
      RUST_LOG: info
    volumes:
      - ${NOSTR_VPN_DATA_DIR:-./.data}:/data

  web:
    image: ${NOSTR_VPN_IMAGE:-nostr-vpn-umbrel:local}
    restart: unless-stopped
    depends_on:
      - daemon
    ports:
      - 127.0.0.1:${NOSTR_VPN_WEB_PORT:-38080}:38080
    environment:
      HOME: /data/home
      XDG_CONFIG_HOME: /data/config
      NVPN_CLI_PATH: /usr/local/bin/nvpn
      NVPN_DAEMON_STATUS_MODE: state-file
      NVPN_EXTERNAL_DAEMON: "true"
      RUST_LOG: info
    volumes:
      - ${NOSTR_VPN_DATA_DIR:-./.data}:/data

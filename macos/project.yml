name: NostrVpnMac
options:
  bundleIdPrefix: fi.siriusbusiness.nvpn
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: fi.siriusbusiness.nvpn
    MARKETING_VERSION: ${NVPN_APP_VERSION_NAME}
    # Resolved by scripts/macos-build via release_common.sh's
    # resolve_shared_build_metadata before xcodegen runs. Mirrors the iOS
    # setup so any future App-Store-bound or Sparkle-style updater sees a
    # unique CFBundleVersion per release rather than the literal "1".
    CURRENT_PROJECT_VERSION: ${NVPN_APP_VERSION_CODE}
    VERSIONING_SYSTEM: apple-generic
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: 5.0
    ENABLE_DEBUG_DYLIB: NO

targets:
  NostrVpnMac:
    type: application
    platform: macOS
    sources:
      - path: Sources
      - path: Bindings
        excludes:
          - "*.h"
          - "*.modulemap"
      - path: Resources
        buildPhase: resources
    settings:
      base:
        PRODUCT_NAME: Nostr VPN
        PRODUCT_MODULE_NAME: NostrVpnMac
        DEFINES_MODULE: YES
        INFOPLIST_FILE: Info.plist
        CODE_SIGN_ENTITLEMENTS: NostrVpnMac.entitlements
        INFOPLIST_KEY_CFBundleDisplayName: Nostr VPN
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - framework: Frameworks/NostrVpnAppCore.xcframework
        embed: false
      - sdk: SystemConfiguration.framework
      - sdk: Security.framework

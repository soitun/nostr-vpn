# Points to a stable filename rather than `dist/nostr-vpn-v*-android-arm64.apk`
# because `dist/` accumulates APKs across releases (including builds with old
# Android package ids), and zsp picks one match
# from the glob without a clear "latest" rule. `scripts/local-release.mjs`
# copies the current release's APK to this stable path before invoking zsp.
release_source: dist/zapstore-current-android-arm64.apk

name: Nostr VPN
summary: Mesh VPN built on Nostr signaling and userspace WireGuard.
description: |
  Nostr VPN is a Tailscale-style mesh VPN for your own devices and trusted peers.

  Nostr is used for peer discovery and encrypted signaling; the data plane
  is userspace WireGuard, with the FIPS overlay handling NAT traversal and
  transit through friend-of-a-friend nodes when direct paths are blocked.

  Current app capabilities:
  - private mesh networking between approved participants
  - admin-driven invite + join flows
  - exit nodes and route advertisement (incl. WireGuard upstream)
  - MagicDNS-style `.nvpn` naming inside the mesh
  - manual pairing fallback when relay-mediated invites aren't an option


services:
  node-a:
    build:
      context: .
      dockerfile: Dockerfile.e2e
      args:
        NVPN_E2E_BUILDER_IMAGE: ${NVPN_E2E_BUILDER_IMAGE:-rust:1.93-bookworm}
        NVPN_E2E_RUNTIME_IMAGE: ${NVPN_E2E_RUNTIME_IMAGE:-debian:bookworm-slim}
        NVPN_E2E_BUILDER_APT_INSTALL: ${NVPN_E2E_BUILDER_APT_INSTALL:-1}
        NVPN_E2E_RUNTIME_APT_INSTALL: ${NVPN_E2E_RUNTIME_APT_INSTALL:-1}
        NVPN_PATCH_LOCAL_FIPS: ${NVPN_PATCH_LOCAL_FIPS:-0}
      additional_contexts:
        fips: ${NVPN_FIPS_REPO_PATH:-./docker/empty-fips-context}
    entrypoint: ["sleep", "infinity"]
    environment:
      FIPS_PEER_ACTOR: "${FIPS_PEER_ACTOR:-0}"
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    networks:
      e2e:
        ipv4_address: ${NVPN_E2E_NODE_A_UNDERLAY_IP:-10.203.0.10}

  node-b:
    build:
      context: .
      dockerfile: Dockerfile.e2e
      args:
        NVPN_E2E_BUILDER_IMAGE: ${NVPN_E2E_BUILDER_IMAGE:-rust:1.93-bookworm}
        NVPN_E2E_RUNTIME_IMAGE: ${NVPN_E2E_RUNTIME_IMAGE:-debian:bookworm-slim}
        NVPN_E2E_BUILDER_APT_INSTALL: ${NVPN_E2E_BUILDER_APT_INSTALL:-1}
        NVPN_E2E_RUNTIME_APT_INSTALL: ${NVPN_E2E_RUNTIME_APT_INSTALL:-1}
        NVPN_PATCH_LOCAL_FIPS: ${NVPN_PATCH_LOCAL_FIPS:-0}
      additional_contexts:
        fips: ${NVPN_FIPS_REPO_PATH:-./docker/empty-fips-context}
    entrypoint: ["sleep", "infinity"]
    environment:
      FIPS_PEER_ACTOR: "${FIPS_PEER_ACTOR:-0}"
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    networks:
      e2e:
        ipv4_address: ${NVPN_E2E_NODE_B_UNDERLAY_IP:-10.203.0.11}

  node-c:
    build:
      context: .
      dockerfile: Dockerfile.e2e
      args:
        NVPN_E2E_BUILDER_IMAGE: ${NVPN_E2E_BUILDER_IMAGE:-rust:1.93-bookworm}
        NVPN_E2E_RUNTIME_IMAGE: ${NVPN_E2E_RUNTIME_IMAGE:-debian:bookworm-slim}
        NVPN_E2E_BUILDER_APT_INSTALL: ${NVPN_E2E_BUILDER_APT_INSTALL:-1}
        NVPN_E2E_RUNTIME_APT_INSTALL: ${NVPN_E2E_RUNTIME_APT_INSTALL:-1}
        NVPN_PATCH_LOCAL_FIPS: ${NVPN_PATCH_LOCAL_FIPS:-0}
      additional_contexts:
        fips: ${NVPN_FIPS_REPO_PATH:-./docker/empty-fips-context}
    entrypoint: ["sleep", "infinity"]
    environment:
      FIPS_PEER_ACTOR: "${FIPS_PEER_ACTOR:-0}"
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    networks:
      e2e:
        ipv4_address: ${NVPN_E2E_NODE_C_UNDERLAY_IP:-10.203.0.12}

networks:
  e2e:
    driver: bridge
    ipam:
      config:
        - subnet: ${NVPN_E2E_UNDERLAY_SUBNET:-10.203.0.0/24}

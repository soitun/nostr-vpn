services:
  node-a:
    build:
      context: .
      dockerfile: Dockerfile.e2e
      additional_contexts:
        fips: ../fips
    entrypoint: ["sleep", "infinity"]
    environment:
      FIPS_PEER_ACTOR: "${FIPS_PEER_ACTOR:-0}"
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    networks:
      e2e:
        ipv4_address: 10.203.0.10

  node-b:
    build:
      context: .
      dockerfile: Dockerfile.e2e
      additional_contexts:
        fips: ../fips
    entrypoint: ["sleep", "infinity"]
    environment:
      FIPS_PEER_ACTOR: "${FIPS_PEER_ACTOR:-0}"
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    networks:
      e2e:
        ipv4_address: 10.203.0.11

  node-c:
    build:
      context: .
      dockerfile: Dockerfile.e2e
      additional_contexts:
        fips: ../fips
    entrypoint: ["sleep", "infinity"]
    environment:
      FIPS_PEER_ACTOR: "${FIPS_PEER_ACTOR:-0}"
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    networks:
      e2e:
        ipv4_address: 10.203.0.12

networks:
  e2e:
    driver: bridge
    ipam:
      config:
        - subnet: 10.203.0.0/24

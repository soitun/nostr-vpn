name: nostr-vpn-gui
options:
  bundleIdPrefix: to.iris.nvpn
  deploymentTarget:
    iOS: 14.0
fileGroups: [../../src]
configs:
  debug: debug
  release: release
settingGroups:
  app:
    base:
      PRODUCT_NAME: Nostr VPN
      PRODUCT_BUNDLE_IDENTIFIER: to.iris.nvpn
  packet-tunnel:
    base:
      PRODUCT_NAME: Nostr VPN Tunnel
      PRODUCT_BUNDLE_IDENTIFIER: to.iris.nvpn.PacketTunnel
targetTemplates:
  app:
    type: application
    sources:
      - path: Sources
    scheme:
      environmentVariables:
        RUST_BACKTRACE: full
        RUST_LOG: info
    settings:
      groups: [app]
targets:
  nostr-vpn-gui_iOS:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Assets.xcassets
      - path: Externals
      - path: nostr-vpn-gui_iOS
      - path: assets
        buildPhase: resources
        type: folder
      - path: LaunchScreen.storyboard
    info:
      path: nostr-vpn-gui_iOS/Info.plist
      properties:
        LSRequiresIPhoneOS: true
        NSAppTransportSecurity:
          NSAllowsArbitraryLoadsInWebContent: true
          NSAllowsLocalNetworking: true
        NSCameraUsageDescription: Scan Nostr VPN invite QR codes.
        NSPhotoLibraryUsageDescription: Select a saved invite QR image to join a network.
        UILaunchStoryboardName: LaunchScreen
        UIRequiredDeviceCapabilities: [arm64, metal]
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        CFBundleShortVersionString: 0.3.13
        CFBundleVersion: "0.3.13"
    entitlements:
      path: nostr-vpn-gui_iOS/nostr-vpn-gui_iOS.entitlements
    scheme:
      environmentVariables:
        RUST_BACKTRACE: full
        RUST_LOG: info
    settings:
      base:
        ENABLE_BITCODE: false
        ARCHS: [arm64]
        VALID_ARCHS: arm64
        LIBRARY_SEARCH_PATHS[arch=x86_64]: $(inherited) $(PROJECT_DIR)/Externals/x86_64/$(CONFIGURATION) $(SDKROOT)/usr/lib/swift $(TOOLCHAIN_DIR)/usr/lib/swift/$(PLATFORM_NAME) $(TOOLCHAIN_DIR)/usr/lib/swift-5.0/$(PLATFORM_NAME)
        LIBRARY_SEARCH_PATHS[arch=arm64]: $(inherited) $(PROJECT_DIR)/Externals/arm64/$(CONFIGURATION) $(SDKROOT)/usr/lib/swift $(TOOLCHAIN_DIR)/usr/lib/swift/$(PLATFORM_NAME) $(TOOLCHAIN_DIR)/usr/lib/swift-5.0/$(PLATFORM_NAME)
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: true
        EXCLUDED_ARCHS[sdk=iphoneos*]: x86_64
      groups: [app]
    dependencies:
      - target: nostr-vpn-gui_PacketTunnel
        embed: true
        codeSign: true
        copy:
          destination: plugins
      - framework: libapp.a
        embed: false
      - sdk: CoreGraphics.framework
      - sdk: NetworkExtension.framework
      - sdk: Metal.framework
      - sdk: MetalKit.framework
      - sdk: QuartzCore.framework
      - sdk: Security.framework
      - sdk: UIKit.framework
      - sdk: WebKit.framework
    preBuildScripts:
      - script: bash "${SRCROOT}/scripts/sync-web-assets.sh"
        name: Sync Web Assets
        basedOnDependencyAnalysis: false
      - script: pnpm tauri ios xcode-script -v --platform ${PLATFORM_DISPLAY_NAME:?} --sdk-root ${SDKROOT:?} --framework-search-paths "${FRAMEWORK_SEARCH_PATHS:?}" --header-search-paths "${HEADER_SEARCH_PATHS:?}" --gcc-preprocessor-definitions "${GCC_PREPROCESSOR_DEFINITIONS:-}" --configuration ${CONFIGURATION:?} ${FORCE_COLOR} ${ARCHS:?}
        name: Build Rust Code
        basedOnDependencyAnalysis: false
  nostr-vpn-gui_PacketTunnel:
    type: app-extension
    platform: iOS
    sources:
      - path: PacketTunnel
      - path: Sources
        includes:
          - VpnShared/**
    info:
      path: PacketTunnel/Info.plist
      properties:
        CFBundleShortVersionString: "0.3.13"
        CFBundleVersion: "0.3.13"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.networkextension.packet-tunnel
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).PacketTunnelProvider
    entitlements:
      path: PacketTunnel/PacketTunnel.entitlements
    settings:
      groups: [packet-tunnel]
      base:
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: true
        ARCHS: [arm64]
        VALID_ARCHS: arm64
        LIBRARY_SEARCH_PATHS[arch=x86_64]: $(inherited) $(PROJECT_DIR)/Externals/x86_64/$(CONFIGURATION) $(SDKROOT)/usr/lib/swift $(TOOLCHAIN_DIR)/usr/lib/swift/$(PLATFORM_NAME) $(TOOLCHAIN_DIR)/usr/lib/swift-5.0/$(PLATFORM_NAME)
        LIBRARY_SEARCH_PATHS[arch=arm64]: $(inherited) $(PROJECT_DIR)/Externals/arm64/$(CONFIGURATION) $(SDKROOT)/usr/lib/swift $(TOOLCHAIN_DIR)/usr/lib/swift/$(PLATFORM_NAME) $(TOOLCHAIN_DIR)/usr/lib/swift-5.0/$(PLATFORM_NAME)
        SWIFT_OBJC_BRIDGING_HEADER: PacketTunnel/PacketTunnel-Bridging-Header.h
        EXCLUDED_ARCHS[sdk=iphoneos*]: x86_64
    dependencies:
      - framework: libapp.a
        embed: false
      - sdk: Foundation.framework
      - sdk: NetworkExtension.framework
    preBuildScripts:
      - script: bash "${SRCROOT}/scripts/build-rust-staticlib.sh"
        name: Build Rust Code
        basedOnDependencyAnalysis: false
    postBuildScripts:
      - script: |
          set -euo pipefail
          plist="${TARGET_BUILD_DIR}/${INFOPLIST_PATH}"
          /usr/libexec/PlistBuddy -c "Delete :CFBundleShortVersionString" "${plist}" || true
          /usr/libexec/PlistBuddy -c "Add :CFBundleShortVersionString string 0.3.13" "${plist}"
          /usr/libexec/PlistBuddy -c "Delete :CFBundleVersion" "${plist}" || true
          /usr/libexec/PlistBuddy -c "Add :CFBundleVersion string 0.3.13" "${plist}"
          /usr/libexec/PlistBuddy -c "Delete :NSExtension" "${plist}" || true
          /usr/libexec/PlistBuddy -c "Add :NSExtension dict" "${plist}"
          /usr/libexec/PlistBuddy -c "Add :NSExtension:NSExtensionPointIdentifier string com.apple.networkextension.packet-tunnel" "${plist}"
          /usr/libexec/PlistBuddy -c "Add :NSExtension:NSExtensionPrincipalClass string ${PRODUCT_MODULE_NAME}.PacketTunnelProvider" "${plist}"
        name: Patch Extension Info
        basedOnDependencyAnalysis: false

services:
  # 203.0.113.0/24 is reachable only through wg-upstream's public-side eth.
  # Without the WireGuard tunnel, node-a cannot reach this host, so any
  # successful ping to it proves traffic is going through the WG upstream.
  internet-target:
    build:
      context: .
      dockerfile: Dockerfile.e2e
      args:
        NVPN_E2E_BUILDER_IMAGE: ${NVPN_E2E_BUILDER_IMAGE:-rust:1.93-bookworm}
        NVPN_E2E_RUNTIME_IMAGE: ${NVPN_E2E_RUNTIME_IMAGE:-debian:bookworm-slim}
        NVPN_E2E_BUILDER_APT_INSTALL: ${NVPN_E2E_BUILDER_APT_INSTALL:-1}
        NVPN_E2E_RUNTIME_APT_INSTALL: ${NVPN_E2E_RUNTIME_APT_INSTALL:-1}
        NVPN_PATCH_LOCAL_FIPS: ${NVPN_PATCH_LOCAL_FIPS:-0}
      additional_contexts:
        cashu-service: ${NVPN_CASHU_SERVICE_REPO_PATH:-./docker/empty-cashu-service-context}
        cashu-spilman-channels: ${NVPN_CASHU_SPILMAN_CHANNELS_REPO_PATH:-./docker/empty-cashu-spilman-context}
        fips: ${NVPN_FIPS_REPO_PATH:-./docker/empty-fips-context}
    cap_add:
      - NET_ADMIN
    entrypoint: ["sleep", "infinity"]
    networks:
      public:
        ipv4_address: 203.0.113.100

  wg-upstream:
    build:
      context: .
      dockerfile: Dockerfile.e2e
      args:
        NVPN_E2E_BUILDER_IMAGE: ${NVPN_E2E_BUILDER_IMAGE:-rust:1.93-bookworm}
        NVPN_E2E_RUNTIME_IMAGE: ${NVPN_E2E_RUNTIME_IMAGE:-debian:bookworm-slim}
        NVPN_E2E_BUILDER_APT_INSTALL: ${NVPN_E2E_BUILDER_APT_INSTALL:-1}
        NVPN_E2E_RUNTIME_APT_INSTALL: ${NVPN_E2E_RUNTIME_APT_INSTALL:-1}
        NVPN_PATCH_LOCAL_FIPS: ${NVPN_PATCH_LOCAL_FIPS:-0}
      additional_contexts:
        cashu-service: ${NVPN_CASHU_SERVICE_REPO_PATH:-./docker/empty-cashu-service-context}
        cashu-spilman-channels: ${NVPN_CASHU_SPILMAN_CHANNELS_REPO_PATH:-./docker/empty-cashu-spilman-context}
        fips: ${NVPN_FIPS_REPO_PATH:-./docker/empty-fips-context}
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.forwarding=1
      - net.ipv4.conf.default.forwarding=1
    devices:
      - /dev/net/tun:/dev/net/tun
    entrypoint: ["sleep", "infinity"]
    networks:
      internet:
        ipv4_address: 10.203.0.20
      public:
        ipv4_address: 203.0.113.20

  node-a:
    build:
      context: .
      dockerfile: Dockerfile.e2e
      args:
        NVPN_E2E_BUILDER_IMAGE: ${NVPN_E2E_BUILDER_IMAGE:-rust:1.93-bookworm}
        NVPN_E2E_RUNTIME_IMAGE: ${NVPN_E2E_RUNTIME_IMAGE:-debian:bookworm-slim}
        NVPN_E2E_BUILDER_APT_INSTALL: ${NVPN_E2E_BUILDER_APT_INSTALL:-1}
        NVPN_E2E_RUNTIME_APT_INSTALL: ${NVPN_E2E_RUNTIME_APT_INSTALL:-1}
        NVPN_PATCH_LOCAL_FIPS: ${NVPN_PATCH_LOCAL_FIPS:-0}
      additional_contexts:
        cashu-service: ${NVPN_CASHU_SERVICE_REPO_PATH:-./docker/empty-cashu-service-context}
        cashu-spilman-channels: ${NVPN_CASHU_SPILMAN_CHANNELS_REPO_PATH:-./docker/empty-cashu-spilman-context}
        fips: ${NVPN_FIPS_REPO_PATH:-./docker/empty-fips-context}
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    entrypoint: ["sleep", "infinity"]
    networks:
      internet:
        ipv4_address: 10.203.0.10

  node-b:
    build:
      context: .
      dockerfile: Dockerfile.e2e
      args:
        NVPN_E2E_BUILDER_IMAGE: ${NVPN_E2E_BUILDER_IMAGE:-rust:1.93-bookworm}
        NVPN_E2E_RUNTIME_IMAGE: ${NVPN_E2E_RUNTIME_IMAGE:-debian:bookworm-slim}
        NVPN_E2E_BUILDER_APT_INSTALL: ${NVPN_E2E_BUILDER_APT_INSTALL:-1}
        NVPN_E2E_RUNTIME_APT_INSTALL: ${NVPN_E2E_RUNTIME_APT_INSTALL:-1}
        NVPN_PATCH_LOCAL_FIPS: ${NVPN_PATCH_LOCAL_FIPS:-0}
      additional_contexts:
        cashu-service: ${NVPN_CASHU_SERVICE_REPO_PATH:-./docker/empty-cashu-service-context}
        cashu-spilman-channels: ${NVPN_CASHU_SPILMAN_CHANNELS_REPO_PATH:-./docker/empty-cashu-spilman-context}
        fips: ${NVPN_FIPS_REPO_PATH:-./docker/empty-fips-context}
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    entrypoint: ["sleep", "infinity"]
    networks:
      internet:
        ipv4_address: 10.203.0.11

networks:
  internet:
    driver: bridge
    ipam:
      config:
        - subnet: 10.203.0.0/24
  public:
    driver: bridge
    ipam:
      config:
        - subnet: 203.0.113.0/24
